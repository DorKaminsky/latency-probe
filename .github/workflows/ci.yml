name: CI

# Trigger on push to main and on all pull requests.
# This ensures every proposed change is validated before merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache pip downloads so repeated runs don't re-download packages
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Check formatting (black)
        run: black --check app/ tests/

      - name: Check import order (isort)
        run: isort --check-only app/ tests/

      - name: Lint (flake8)
        run: flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint  # Don't waste runner time on tests if lint fails
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --tb=short -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test  # Only build image if tests pass
    steps:
      - uses: actions/checkout@v4

      # docker/setup-buildx-action enables BuildKit, which supports:
      # - Multi-stage builds (used in our Dockerfile)
      # - Layer caching via cache-from/cache-to
      # - Parallel stage builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false  # Validate the build without pushing to a registry
          tags: latency-probe:${{ github.sha }}
          # Cache layers from the previous build stored in GitHub Actions cache.
          # Dramatically speeds up builds when only source code changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max
