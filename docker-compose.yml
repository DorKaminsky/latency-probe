services:
  latency-probe:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      # Optional — enables the /probe/{id}/analyze LLM endpoint
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      latency-probe:
        condition: service_healthy
