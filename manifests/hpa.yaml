apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: latency-probe
  namespace: latency-probe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: latency-probe
  minReplicas: 1
  maxReplicas: 5
  metrics:
    # Scale out when average CPU across all pods exceeds 70%.
    # For a CPU-bound probe service this is the right signal;
    # if we later add a Redis-backed job store we could also scale on
    # custom metrics (queue depth, active job count).
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
